name: Claude Assistant
# 이슈/PR 댓글에 @claude 멘션 → 분석·구현·PR 생성
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

concurrency:
  group: claude-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  claude:
    # @claude 멘션 또는 'claude' 라벨이 붙은 이슈만 트리거
    if: |
      contains(github.event.comment.body, '@claude') ||
      github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # CLAUDE.md의 자율 실행 경계를 따름. main 직접 푸시 금지 → 항상 브랜치+PR
